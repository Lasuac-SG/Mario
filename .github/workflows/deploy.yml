name: Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: Build tests
        shell: pwsh
        run: >
          cmake --build build
          --config Debug
          --target test_common test_model test_audio

      - name: Run tests before packaging
        shell: pwsh
        run: ctest --test-dir build/tests -C Debug --output-on-failure

      - name: Build release game
        shell: pwsh
        run: >
          cmake --build build
          --config Release
          --target mario

      - name: Assemble package
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "dist\Mario-windows-x64"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "build\Release\*" $packageDir -Recurse -Force
          Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\Mario-windows-x64.zip" -Force

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mario-windows-x64
          path: dist/Mario-windows-x64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Mario-windows-x64.zip
